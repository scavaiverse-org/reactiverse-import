[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[functions.generateScrollableImageExtension]
verify_jwt = true

[functions.migrateWalkthroughV3]
verify_jwt = true

[functions.postOperationalStatusUpdate]
verify_jwt = true

[functions.repairWalkthroughMediaLinks]
verify_jwt = true

[functions.verifyPortalAccess]
verify_jwt = false

[functions.cultural-guide]
verify_jwt = false

[functions.qa-agent]
verify_jwt = true

# Public: called fire-and-forget by the anonymous tenant/vendor forms.
[functions.notify-inquiry]
verify_jwt = false

# Public: Stripe posts webhook events with no Supabase JWT, so JWT verification
# must be off (signature is verified inside the function via STRIPE_WEBHOOK_SECRET).
[functions.stripe-webhook]
verify_jwt = false

# Admin-only: emails confirmed pre-bookers when a museum is published. Requires a
# logged-in admin JWT (the function also re-checks the caller's role).
[functions.notify-launch]
verify_jwt = true

# Public: anonymous visitors (no JWT) read/write their own journey, collectibles,
# and badges through this gateway. The function scopes every query by the caller-
# supplied visitor_id and rate-limits per IP, so JWT verification must be off.
[functions.visitor-data]
verify_jwt = false

# Public: anonymous visitors start ticket checkout before signing in. Prices are
# resolved server-side and the call is rate-limited; no Supabase JWT is present.
[functions.stripe-checkout]
verify_jwt = false

# Public: prospective tenants start the franchise checkout from the anonymous
# application form, so there is no Supabase JWT to verify.
[functions.franchise-checkout]
verify_jwt = false
